name: iosApp
options:
  bundleIdPrefix: com.rcforb
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Cocoapods isn't used; we link the Shared framework directly.

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rcforb.ios
        PRODUCT_NAME: RCForb
        INFOPLIST_FILE: iosApp/Info.plist
        # Don't auto-generate keys — we ship a hand-curated Info.plist.
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        DEVELOPMENT_TEAM: ""
        # Search paths point at the gradle build output for the matching
        # configuration + arch. The pre-build script (preActions) drops the
        # framework here via embedAndSignAppleFrameworkForXcode.
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        ENABLE_BITCODE: NO
        SWIFT_INSTALL_OBJC_HEADER: NO
    dependencies:
      - framework: Shared.framework
        embed: true
        codeSign: true
        link: true
        implicit: true
    preBuildScripts:
      - name: Compile Shared (Kotlin Multiplatform)
        script: |
          cd "$SRCROOT/.."
          ./gradlew :embedAndSignAppleFrameworkForXcode \
            -Pkotlin.native.cocoapods.platform="$PLATFORM_NAME" \
            -Pkotlin.native.cocoapods.archs="$ARCHS" \
            -Pkotlin.native.cocoapods.configuration="$CONFIGURATION"
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/Shared.framework
